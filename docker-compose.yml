# ============================================================
# Personal Automation System — Docker Compose
# ============================================================
# Production setup: core + ollama, no exposed ports (use Cloudflare Tunnel).
# Copy .env.example to .env and fill in required values before running.
# ============================================================

services:
  core:
    build: .
    container_name: pas-core
    restart: unless-stopped
    env_file: .env
    environment:
      - OLLAMA_URL=http://ollama:11434
      - DATA_DIR=/app/data
      - NODE_ENV=production
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    # No ports exposed — access via Cloudflare Tunnel
    # Uncomment below to expose locally:
    # ports:
    #   - "3000:3000"

  ollama:
    image: ollama/ollama:latest
    container_name: pas-ollama
    restart: unless-stopped
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

volumes:
  ollama-models:
