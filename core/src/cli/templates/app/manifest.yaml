app:
  id: {{APP_ID}}
  name: "{{APP_NAME}}"
  version: "1.0.0"
  description: "{{APP_DESCRIPTION}}"
  author: "{{AUTHOR}}"
  pas_core_version: ">=0.1.0"
  license: "MIT"
  category: utility
  tags: []

capabilities:
