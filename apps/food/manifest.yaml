app:
  id: food
  name: "Food"
  version: "0.1.0"
  description: "Household food management — recipes, meal planning, grocery lists, pantry tracking, nutrition, and family food intelligence."
  author: "PAS Team"
  pas_core_version: ">=0.1.0"
  license: "MIT"
  category: home
  tags:
    - food
    - recipes
    - meal-planning
    - grocery
    - cooking
    - nutrition
    - family
    - pantry
    - meal-prep
    - kitchen

capabilities:
  messages:
    intents:
      - "user wants to save a recipe"
      - "user wants to search for a recipe"
      - "user wants to plan meals for the week"
      - "user wants to see or modify the grocery list"
      - "user wants to add items to the grocery list"
      - "user wants to know what's for dinner"
      - "user has a food-related question"
      - "user wants to start cooking a recipe"
      - "user wants to check or update the pantry"
      - "user wants to log leftovers"
      - "user wants to plan for hosting guests"
      - "user wants to see food spending"
      - "user wants to see nutrition information"
      - "user wants to know what they can make with what they have"
      - "user wants to adapt a recipe for a child"
      - "user wants to log a new food introduction for a child"
      - "user wants to tag a recipe as kid-approved or rejected"
      - "user wants to log a meal they cooked by name with an optional portion"
      - "user wants to log an unfamiliar meal with a free-text description"
      - "user wants to save a frequent meal as a quick-meal template"
      - "user wants to set or change their nutrition or macro targets"
      - "user wants to see how well they are hitting their macro targets over time"
      - "user wants to understand how their diet is affecting their health or energy"
      - "user wants holiday or cultural recipe suggestions"
    commands:
      - name: /recipes
        description: "Browse and search your recipe library"
      - name: /mealplan
        description: "View current meal plan or generate a new one"
      - name: /grocery
        description: "View the current grocery list"
      - name: /addgrocery
        description: "Quick-add items to the grocery list"
        args: ["items"]
      - name: /pantry
        description: "View or update pantry inventory"
      - name: /freezer
        description: "View or update freezer inventory"
      - name: /cook
        description: "Start cook mode for a recipe"
        args: ["recipe"]
      - name: /leftovers
        description: "Log or view current leftovers"
      - name: /hosting
        description: "Plan a menu for hosting guests"
      - name: /foodbudget
        description: "View food cost tracking and reports"
      - name: /nutrition
        description: "View nutrition summaries and reports, log meals, and manage quick-meal templates (use subcommands: today, week, month, log, meals add|list|edit|remove, adherence, targets)"
      - name: /whatsfordinner
        description: "See what's planned for tonight"
      - name: /family
        description: "Manage child profiles and food introduction tracking"
      - name: /household
        description: "Create, join, or manage your household link"
    accepts_photos: true
    photo_intents:
      - "photo of a recipe to save"
      - "photo of a grocery receipt"
      - "photo of pantry or fridge contents"

  schedules:
    - id: generate-weekly-plan
      description: "Auto-generate the weekly meal plan and send for voting"
      cron: "0 9 * * 0"
      handler: "dist/handlers/generate-plan.js"
      user_scope: shared
    - id: finalize-votes
      description: "Check voting windows and finalize expired meal plan votes"
      cron: "0 * * * *"
      handler: "dist/handlers/voting.js"
      user_scope: shared
    - id: nightly-rating-prompt
      description: "Send nightly 'What did you cook?' rating prompts at 8pm"
      cron: "0 20 * * *"
      handler: "dist/handlers/rating.js"
      user_scope: shared
    - id: perishable-check
      description: "Check pantry for items approaching expiry"
      cron: "0 9 * * *"
      handler: "dist/handlers/perishable-check.js"
      user_scope: shared
    - id: freezer-check
      description: "Check freezer for items that should be used soon"
      cron: "0 9 * * 1"
      handler: "dist/handlers/freezer-check.js"
      user_scope: shared
    - id: leftover-check
      description: "Check leftovers approaching expiry"
      cron: "0 10 * * *"
      handler: "dist/handlers/leftover-check.js"
      user_scope: shared
    - id: seasonal-nudge
      description: "Suggest in-season recipes"
      cron: "0 10 1,15 * *"
      handler: "dist/handlers/seasonal-nudge.js"
      user_scope: shared
    - id: weekly-nutrition-summary
      description: "Send weekly macro/nutrition summary"
      cron: "0 20 * * 0"
      handler: "dist/handlers/nutrition-summary.js"
      user_scope: all
    - id: cuisine-diversity-check
      description: "Flag cuisine repetition in recent plans"
      cron: "0 8 * * 0"
      handler: "dist/handlers/cuisine-diversity.js"
      user_scope: shared
    - id: weekly-health-correlation
      description: "Weekly diet-performance correlation summary per user"
      cron: "0 9 * * 1"
      handler: "dist/handlers/health.js"
      user_scope: all
    - id: defrost-check
      description: "Check if tomorrow's meals need frozen ingredients defrosted"
      cron: "0 19 * * *"
      handler: "dist/handlers/defrost-check.js"
      user_scope: shared
    - id: cultural-calendar-check
      description: "Check for upcoming holidays and suggest themed recipes"
      cron: "0 10 * * 0"
      handler: "dist/handlers/cultural-calendar-handler.js"
      user_scope: shared

  events:
    emits:
      - id: "food:meal-plan-finalized"
        description: "Fired when a weekly meal plan is finalized after voting"
      - id: "food:grocery-list-ready"
        description: "Fired when a grocery list is generated or updated"
      - id: "food:recipe-scheduled"
        description: "Fired when a recipe is scheduled for a specific date"
      - id: "food:meal-cooked"
        description: "Fired when a meal is marked as cooked"
      - id: "food:shopping-completed"
        description: "Fired when a shopping session is completed"
    subscribes:
      - event: "health:daily-metrics"
        handler: "dist/events/subscribers.js"
        required: false

requirements:
  services:
    - telegram
    - data-store
    - llm
    - scheduler
    - event-bus
    - audio
    - context-store
    - interaction-context
    - data-query
  data:
    shared_scopes:
      - path: "recipes/"
        access: read-write
        description: "Recipe library shared across the household"
      - path: "meal-plans/"
        access: read-write
        description: "Weekly meal plans and archives"
      - path: "grocery/"
        access: read-write
        description: "Active and historical grocery lists"
      - path: "pantry.yaml"
        access: read-write
        description: "Pantry inventory"
      - path: "freezer.yaml"
        access: read-write
        description: "Freezer inventory"
      - path: "leftovers.yaml"
        access: read-write
        description: "Leftover tracker"
      - path: "household.yaml"
        access: read-write
        description: "Household membership and shared config"
      - path: "children/"
        access: read-write
        description: "Child food logs and allergen tracking"
      - path: "guests.yaml"
        access: read-write
        description: "Frequent guest dietary profiles"
      - path: "receipts/"
        access: read-write
        description: "Grocery receipt data and photos"
      - path: "photos/"
        access: read-write
        description: "Original photos from recipe and pantry captures"
      - path: "seasonal/"
        access: read-write
        description: "Seasonal produce reference data"
      - path: "cultural-calendar.yaml"
        access: read-write
        description: "Household cultural calendar with holiday preferences"
      - path: "waste-log.yaml"
        access: read-write
        description: "Food waste tracking"
      - path: "prices/"
        access: read-write
        description: "Per-store price database files"
      - path: "cost-history/"
        access: read-write
        description: "Weekly grocery cost history summaries"
    user_scopes:
      - path: "preferences.yaml"
        access: read-write
        description: "Individual dietary preferences and macro targets"
      - path: "nutrition/"
        access: read-write
        description: "Per-user monthly macro intake logs"
      - path: "shopping-sessions/"
        access: read-write
        description: "Shopping mode session history"
      - path: "health/"
        access: read-write
        description: "Per-user monthly health metrics from cross-app events"
      - path: "ad-hoc-history.yaml"
        access: read-write
        description: "Rolling 30-day ad-hoc meal log dedup history"
      - path: "quick-meals.yaml"
        access: read-write
        description: "Quick-meal templates and archive"
      - path: "corrupt/"
        access: read-write
        description: "Corrupt YAML recovery sidecars (rare, written only on YAML parse failure)"
  llm:
    tier: standard
    rate_limit:
      max_requests: 60
      window_seconds: 3600
    monthly_cost_cap: 15.00

user_config:
  - key: meal_plan_dinners
    type: number
    default: 5
    description: "Number of dinners to plan per week"
  - key: new_recipe_ratio
    type: number
    default: 40
    description: "Percentage of meals that should be new recipes (0-100)"
  - key: dietary_preferences
    type: string
    default: ""
    description: "Comma-separated dietary preferences (e.g., healthy, easy)"
  - key: dietary_restrictions
    type: string
    default: ""
    description: "Comma-separated dietary restrictions (e.g., no red meat on weekdays)"
  - key: voting_window_hours
    type: number
    default: 12
    description: "Hours household members have to vote on meal plans"
  - key: rating_reminder_delay
    type: number
    default: 120
    description: "Minutes after expected cook time to ask for ratings"
  - key: preferred_stores
    type: string
    default: ""
    description: "Comma-separated list of stores for price comparison"
  - key: default_store
    type: string
    default: ""
    description: "Default store for price estimates"
  - key: show_price_estimates
    type: boolean
    default: false
    description: "Show estimated prices on grocery lists"
  - key: staple_items
    type: string
    default: "salt,pepper,olive oil,butter,garlic"
    description: "Comma-separated items assumed to be on hand"
  - key: shopping_followup_hours
    type: number
    default: 24
    description: "Hours after shopping mode to send follow-up"
  - key: location
    type: string
    default: "Raleigh, NC"
    description: "Your location for seasonal produce awareness (e.g., 'Boston, MA', 'Portland, OR')"
  - key: seasonal_nudges
    type: boolean
    default: true
    description: "Send seasonal produce suggestions"
  - key: child_meal_adaptation
    type: boolean
    default: true
    description: "Auto-suggest kid-friendly recipe adaptations"
  - key: allergen_wait_days
    type: number
    default: 3
    description: "Days to wait between introducing new allergens for babies"
  - key: cooking_speaker_device
    type: string
    default: ""
    description: "Chromecast/Google Home device name for hands-free cooking. Leave empty for system default."
  - key: hands_free_default
    type: boolean
    default: false
    description: "Automatically enable voice output when starting cook mode (skip the prompt)."
  - key: macro_target_calories
    type: number
    default: 0
    description: "Daily calorie target (0 = not set)"
  - key: macro_target_protein
    type: number
    default: 0
    description: "Daily protein target in grams (0 = not set)"
  - key: macro_target_carbs
    type: number
    default: 0
    description: "Daily carbs target in grams (0 = not set)"
  - key: macro_target_fat
    type: number
    default: 0
    description: "Daily fat target in grams (0 = not set)"
  - key: macro_target_fiber
    type: number
    default: 0
    description: "Daily fiber target in grams (0 = not set)"
  - key: guest_profiles_info
    type: string
    default: "Edit via /hosting guests add|remove|list"
    description: "Guest profiles are managed via the /hosting command (not editable here)"
  - key: cultural_calendar
    type: boolean
    default: true
    description: "Send weekly recipe suggestions for upcoming cultural holidays and celebrations (does not affect on-demand queries)"
  - key: schedule_overrides_info
    type: string
    default: "Edit the seasonal-nudge and weekly-nutrition-summary cron schedules via the GUI Scheduler page"
    description: "Schedule cron expressions are managed via the GUI Scheduler page, not here"
