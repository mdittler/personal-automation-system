app:
  id: chatbot
  name: "Chatbot"
  version: "1.3.0"
  description: "AI assistant with PAS app awareness and system introspection. Handles messages when no other app matches."
  author: "PAS Team"
  pas_core_version: ">=0.1.0"
  license: "MIT"
  category: utility
  tags: ["chatbot", "ai", "conversation", "fallback", "assistant"]

capabilities:
  messages:
    intents: []
    commands:
      - name: /ask
        description: "Ask about PAS apps, commands, system status, costs, models, or how things work"
        args: ["question"]
      - name: /edit
        description: "Edit a data file using natural language"
        args: ["description"]

requirements:
  services:
    - telegram
    - data-store
    - llm
    - context-store
    - app-metadata
    - app-knowledge
    - model-journal
    - system-info
    - data-query
    - interaction-context
    - edit-service
  data:
    user_scopes:
      - path: "history.json"
        access: read-write
        description: "Conversation history for context continuity"
      - path: "daily-notes/"
        access: read-write
        description: "Daily notes fallback logging"
  llm:
    tier: standard
    rate_limit:
      # 60 req/hour: auto_detect_pas (default on) makes 2 LLM calls per message
      # (fast-tier classifier + standard-tier response), so 60 preserves ~30 effective messages/hour
      max_requests: 60
      window_seconds: 3600
    monthly_cost_cap: 15.00

user_config:
  - key: auto_detect_pas
    type: boolean
    default: true
    description: "Automatically detect PAS-related questions and include app info in responses (uses LLM classification; disable to use basic conversational mode)"
